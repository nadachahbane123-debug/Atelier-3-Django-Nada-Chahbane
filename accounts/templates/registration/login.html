{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <h2>Connexion</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">
                Se connecter
            </button>
        </form>
        <p class="mt-3">
            Vous n'avez pas encore de compte ?
            <a href="{% url 'signup' %}">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
