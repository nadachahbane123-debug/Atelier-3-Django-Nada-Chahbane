{% extends 'base.html' %}

{% block title %}Créer un compte{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <h2>Création d'un compte</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">
                Créer mon compte
            </button>
        </form>
        <p class="mt-3">
            Vous avez déjà un compte ?
            <a href="{% url 'login' %}">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
